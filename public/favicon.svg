<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  {/* Modern Rounded Square Background with Shadow */}
  <rect x="20" y="20" width="472" height="472" rx="120" fill="url(#grad1)" filter="url(#shadow)" />
  
  {/* Stylized Outer Eye Shape (Guard) */}
  <path 
    d="M256 100C140 100 80 200 80 256s60 156 176 156 176-100 176-156-60-156-176-156zm0 260c-100 0-140-100-140-104 0-4 40-104 140-104s140 100 140 104c0 4-40 104-140 104z" 
    fill="white" 
    opacity="0.2"
  />
  
  {/* Main Eye Shape */}
  <path 
    d="M100 256C100 256 160 140 256 140s156 116 156 116-60 116-156 116-156-116-156-116z" 
    fill="white" 
  />
  
  {/* Large Pupil */}
  <circle cx="256" cy="256" r="60" fill="url(#grad1)" />
  
  {/* Light Reflection */}
  <circle cx="280" cy="230" r="18" fill="white" opacity="0.8" />
  <circle cx="240" cy="280" r="8" fill="white" opacity="0.4" />
</svg>
